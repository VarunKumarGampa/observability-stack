filebeat.inputs:
  - type: container
    paths:
      - /var/lib/docker/containers/*/*.log
    processors:
      - add_docker_metadata:
          host: "unix:///var/run/docker.sock"

      # Only keep logs from the flask-app container
      # Drop everything else (cadvisor, elasticsearch, prometheus, etc)
      - drop_event:
          when:
            not:
              equals:
                container.name: "flask-app"

      - decode_json_fields:
          fields: ["message"]
          target: ""
          overwrite_keys: true

output.logstash:
  hosts: ["logstash:5044"]

logging.level: warning
logging.to_files: false
