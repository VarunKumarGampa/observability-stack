# ── INPUT ─────────────────────────────────────────────────────
# Logstash listens on port 5044 for data from Filebeat
input {
  beats {
    port => 5044
  }
}

# ── FILTER ────────────────────────────────────────────────────
# This is where we transform and enrich the raw log data
filter {

  # Our Flask app outputs JSON logs (we set this up in app.py)
  # This parses the JSON string into individual fields
  # so you can search by level, service, timestamp etc in Kibana
  if [message] =~ /^\{/ {
    json {
      source => "message"
    }
  }

  # If the log has a timestamp field from our app, use it
  # Otherwise Logstash uses the time it received the log
  if [timestamp] {
    date {
      match => ["timestamp", "ISO8601"]
      target => "@timestamp"
    }
  }

  # Tag error logs so we can filter them easily in Kibana
  if [level] == "ERROR" {
    mutate {
      add_tag => ["error"]
    }
  }

  # Tag warning logs
  if [level] == "WARNING" {
    mutate {
      add_tag => ["warning"]
    }
  }

  # Tag slow requests (duration over 1 second)
  # This helps us find performance problems in Kibana
  if [duration] {
    if [duration] > 1.0 {
      mutate {
        add_tag => ["slow_request"]
      }
    }
  }

  # Remove fields we don't need to save storage space
  mutate {
    remove_field => ["agent", "ecs", "input", "log", "host"]
  }
}

# ── OUTPUT ────────────────────────────────────────────────────
# Send processed logs to Elasticsearch
# Each day gets its own index (flask-logs-2026.06.16)
# This makes it easy to delete old logs and manage storage
output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "flask-logs-%{+YYYY.MM.dd}"
  }

  # Also print to console so we can see logs flowing
  # during development — remove this in production
  stdout {
    codec => rubydebug
  }
}