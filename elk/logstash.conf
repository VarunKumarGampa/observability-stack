input {
  beats {
    port => 5044
  }
}

filter {
  if [message] =~ /^\{/ {
    json {
      source => "message"
    }
  }

  if [timestamp] {
    date {
      match => ["timestamp", "ISO8601"]
      target => "@timestamp"
    }
  }

  if [level] == "ERROR" {
    mutate {
      add_tag => ["error"]
    }
  }

  if [level] == "WARNING" {
    mutate {
      add_tag => ["warning"]
    }
  }

  # Only check duration if the field actually exists
  # This prevents the "nil into Integer" crash on logs without this field
  if [duration] {
    ruby {
      code => "
        duration = event.get('duration')
        if duration.is_a?(Numeric) && duration > 1.0
          event.tag('slow_request')
        end
      "
    }
  }

  mutate {
    remove_field => ["agent", "ecs", "input", "log", "host"]
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "flask-logs-%{+YYYY.MM.dd}"
  }

  stdout {
    codec => rubydebug
  }
}